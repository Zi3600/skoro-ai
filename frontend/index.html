<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>skoro-ai</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      background: url('background.jpg') center/cover no-repeat fixed, linear-gradient(160deg, #a8e4f7 0%, #c9f0c8 50%, #7ecff5 100%);
      color: #1a3a4a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.75) 0%, rgba(160,220,255,0.6) 50%, rgba(100,190,240,0.5) 100%);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid rgba(255,255,255,0.8);
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a5a7a;
      text-shadow: 0 1px 2px rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(100,200,255,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    header span { display: inline-block; transition: transform 0.3s; }
    header span:hover { animation: spin 6s linear infinite; }
    header small { font-size: 0.7rem; font-weight: 400; color: #4a8aaa; text-shadow: none; }

    #header-right { display: flex; align-items: center; gap: 10px; }

    #pfp {
      width: 34px;
      height: 34px;
      background: linear-gradient(180deg, rgba(180,225,255,0.9) 0%, rgba(90,170,230,0.85) 100%);
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 2px 6px rgba(0,100,200,0.25), inset 0 1px 0 rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    #logout-btn {
      font-size: 0.68rem;
      color: #4a8aaa;
      background: none;
      border: none;
      cursor: pointer;
      font-family: Tahoma, sans-serif;
      padding: 0;
      text-shadow: none;
    }

    #logout-btn:hover { text-decoration: underline; }

    #credit-bar-wrap {
      padding: 5px 24px;
      background: rgba(255,255,255,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #credit-bar-wrap label { font-size: 0.68rem; color: #1a5a7a; white-space: nowrap; }
    #credit-track { flex: 1; height: 6px; background: rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.7); }
    #credit-bar { height: 100%; width: 0%; background: #4cca6e; transition: width 0.5s, background 0.5s; }
    #credit-pct { font-size: 0.68rem; color: #1a5a7a; white-space: nowrap; min-width: 32px; text-align: right; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #sidebar {
      width: 160px;
      background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(200,240,255,0.4) 100%);
      border-right: 1px solid rgba(255,255,255,0.7);
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      gap: 8px;
      flex-shrink: 0;
    }

    #sidebar p { font-size: 0.68rem; color: #4a8aaa; padding: 0 4px 4px; border-bottom: 1px solid rgba(100,180,240,0.3); margin-bottom: 2px; }

    .slot-btn {
      background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(210,240,255,0.7) 100%);
      border: 1px solid rgba(100,180,240,0.5);
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      font-family: Tahoma, sans-serif;
      font-size: 0.78rem;
      color: #1a5a7a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      transition: all 0.15s;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slot-btn.active {
      background: linear-gradient(180deg, #7dd6f7 0%, #3aaeee 40%, #1a8fd4 100%);
      color: white;
      border-color: rgba(255,255,255,0.5);
      text-shadow: 0 1px 2px rgba(0,80,160,0.4);
    }

    .slot-btn:hover:not(.active) { background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 100%); }

    .slot-clear {
      font-size: 0.65rem;
      color: #e84040;
      background: none;
      border: none;
      cursor: pointer;
      font-family: Tahoma, sans-serif;
      padding: 2px 4px;
      text-align: left;
      opacity: 0.7;
    }

    .slot-clear:hover { opacity: 1; text-decoration: underline; }
    .slot-row { display: flex; flex-direction: column; gap: 2px; }

    #sidebar hr { border: none; border-top: 1px solid rgba(100,180,240,0.3); margin: 4px 0; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 72%;
      padding: 10px 16px;
      line-height: 1.5;
      font-size: 0.88rem;
      white-space: pre-wrap;
    }

    .user {
      background: linear-gradient(180deg, rgba(120,200,255,0.85) 0%, rgba(60,150,230,0.9) 100%);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 8px rgba(0,100,200,0.25), inset 0 1px 0 rgba(255,255,255,0.6);
      align-self: flex-end;
      color: white;
      text-shadow: 0 1px 2px rgba(0,80,160,0.4);
    }

    .assistant {
      background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(220,245,255,0.8) 100%);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(0,150,255,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      align-self: flex-start;
      color: #1a3a4a;
    }

    /* Room messages */
    .room-msg {
      max-width: 80%;
      padding: 8px 12px;
      font-size: 0.85rem;
      line-height: 1.4;
      background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(220,245,255,0.8) 100%);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 6px rgba(0,150,255,0.1);
      align-self: flex-start;
      position: relative;
    }

    .room-msg.mine {
      background: linear-gradient(180deg, rgba(120,200,255,0.85) 0%, rgba(60,150,230,0.9) 100%);
      color: white;
      align-self: flex-end;
      text-shadow: 0 1px 2px rgba(0,80,160,0.4);
    }

    .room-msg .sender { font-size: 0.68rem; opacity: 0.7; margin-bottom: 3px; }
    .room-msg .del-btn {
      font-size: 0.65rem;
      color: #e84040;
      background: none;
      border: none;
      cursor: pointer;
      font-family: Tahoma, sans-serif;
      margin-left: 8px;
      opacity: 0.7;
    }
    .room-msg .del-btn:hover { opacity: 1; }

    .image-preview { max-width: 200px; margin-top: 8px; display: block; border: 1px solid rgba(255,255,255,0.6); }

    #input-area {
      padding: 14px 20px;
      background: linear-gradient(180deg, rgba(200,240,255,0.6) 0%, rgba(255,255,255,0.7) 100%);
      backdrop-filter: blur(8px);
      border-top: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 -2px 8px rgba(100,200,255,0.2);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(230,248,255,0.9) 100%);
      border: 1px solid rgba(100,180,240,0.6);
      padding: 10px 14px;
      color: #1a3a4a;
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      font-size: 0.88rem;
      resize: none;
      outline: none;
      max-height: 120px;
      box-shadow: inset 0 1px 4px rgba(0,100,200,0.1);
    }

    #image-input { display: none; }

    .icon-btn {
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(180,230,255,0.8) 50%, rgba(120,200,255,0.7) 100%);
      border: 1px solid rgba(100,180,240,0.7);
      padding: 9px 12px;
      cursor: pointer;
      color: #1a5a7a;
      font-size: 0.85rem;
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      box-shadow: 0 2px 4px rgba(0,100,200,0.2), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: all 0.15s;
    }

    .icon-btn:hover { background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 50%, rgba(140,210,255,0.8) 100%); }

    #send-btn {
      background: linear-gradient(180deg, #7dd6f7 0%, #3aaeee 40%, #1a8fd4 100%);
      border: 1px solid rgba(255,255,255,0.6);
      padding: 9px 18px;
      cursor: pointer;
      color: white;
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,80,160,0.5);
      box-shadow: 0 3px 8px rgba(0,100,200,0.35), inset 0 1px 0 rgba(255,255,255,0.5);
      transition: all 0.15s;
    }

    #send-btn:hover { background: linear-gradient(180deg, #9de4ff 0%, #55c0f5 40%, #2a9fe0 100%); }
    #image-name { font-size: 0.72rem; color: #3a8aaa; padding: 4px 0 0 4px; }
    .typing { color: #5a9ab5; font-style: italic; font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="login-screen" style="
  position:fixed; inset:0; background:rgba(0,0,0,0.82);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; z-index:999; font-family:Tahoma, Verdana, Geneva, sans-serif;">
  <h2 style="color:white; font-size:1.2rem; font-weight:700;">drerries-ai</h2>
  <input id="login-user" placeholder="username" style="padding:9px 14px; border:1px solid rgba(100,180,240,0.7); font-family:Tahoma,sans-serif; font-size:0.88rem; width:220px; background:rgba(255,255,255,0.92); color:#1a3a4a;" />
  <input id="login-pass" type="password" placeholder="wachtwoord g" style="padding:9px 14px; border:1px solid rgba(100,180,240,0.7); font-family:Tahoma,sans-serif; font-size:0.88rem; width:220px; background:rgba(255,255,255,0.92); color:#1a3a4a;" />
  <button onclick="login()" style="padding:9px 24px; border:1px solid rgba(255,255,255,0.6); background:linear-gradient(180deg,#7dd6f7 0%,#3aaeee 40%,#1a8fd4 100%); color:white; font-family:Tahoma,sans-serif; font-size:0.88rem; font-weight:700; cursor:pointer; box-shadow:0 3px 8px rgba(0,100,200,0.35);">dghil</button>
  <p id="login-error" style="color:#ff6060; display:none; font-size:0.82rem;">verkeerd g probeer opnieuw</p>
  <a href="watisdit.html" style="font-size:0.72rem; color:#a0d0f0; text-decoration:none; margin-top:4px;">wat is dit?</a>
</div>

<header>
  <span>drerries-ai</span>
  <div id="header-right">
    <div id="pfp">
      <svg id="pfp-placeholder" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="8" r="4" fill="rgba(255,255,255,0.85)"/>
        <path d="M2 20c0-5 4-8 9-8s9 3 9 8" stroke="rgba(255,255,255,0.85)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <img id="pfp-img" src="" style="display:none; width:34px; height:34px; object-fit:cover;" />
    </div>
    <button id="logout-btn" onclick="logout()">uitloggen</button>
    <small id="admin-link" style="display:none;"><a href="manage.html" style="color:#e84040; text-decoration:none; font-size:0.7rem; font-weight:700;">beheer</a></small>
    <small><a href="dev.html" style="color:#4a8aaa; text-decoration:none; font-size:0.7rem; font-weight:400;">dev</a></small>
  </div>
</header>

<div id="credit-bar-wrap">
  <label>credits</label>
  <div id="credit-track"><div id="credit-bar"></div></div>
  <span id="credit-pct">0%</span>
</div>

<div id="main">
  <div id="sidebar">
    <p>uw chats</p>
    <div id="slot-list"></div>
    <hr>
    <div class="slot-row">
      <button id="room-btn" class="slot-btn" onclick="openRoom()">drerries</button>
    </div>
  </div>
  <div id="chat"></div>
</div>

<div id="input-area">
  <div style="flex:1; display:flex; flex-direction:column;">
    <textarea id="message-input" rows="1" placeholder="vraag maar g"></textarea>
    <span id="image-name"></span>
  </div>
  <button id="foto-btn" class="icon-btn" onclick="document.getElementById('image-input').click()" title="geen cheatings aub">foto</button>
  <input type="file" id="image-input" accept="image/*" />
  <button id="send-btn" onclick="sendMessage()">scannings</button>
</div>

<script src="https://skoro-ai.onrender.com/socket.io/socket.io.js"></script>
<script>
  const BACKEND = "https://skoro-ai.onrender.com";

  let authToken = localStorage.getItem("token");
  let currentUsername = localStorage.getItem("username") || "";
  let activeSlot = 1;
  let inRoom = false;
  let slots = [];
  let socket = null;

  if (authToken) {
    document.getElementById("login-screen").style.display = "none";
    loadSlots();
    initSocket();
  }

  async function devLogin() {
    document.getElementById("login-user").value = "drerrie1";
    document.getElementById("login-pass").value = "pass1";
    await login();
  }

  async function login() {
    const username = document.getElementById("login-user").value.trim();
    const password = document.getElementById("login-pass").value.trim();
    const res = await fetch(`${BACKEND}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.success) {
      authToken = data.token;
      currentUsername = data.username;
      localStorage.setItem("token", authToken);
      localStorage.setItem("username", currentUsername);
      document.getElementById("login-screen").style.display = "none";
      slots = data.slots;
      setPfp(data.pfp);
      if (data.isAdmin) document.getElementById("admin-link").style.display = "";
      renderSlots();
      switchSlot(1);
      initSocket();
    } else {
      document.getElementById("login-error").style.display = "block";
    }
  }

  function setPfp(url) {
    if (url) {
      document.getElementById("pfp-placeholder").style.display = "none";
      const img = document.getElementById("pfp-img");
      img.src = BACKEND + url;
      img.style.display = "block";
    } else {
      document.getElementById("pfp-placeholder").style.display = "";
      document.getElementById("pfp-img").style.display = "none";
    }
  }

  function initSocket() {
    socket = io(BACKEND, { auth: { token: authToken } });
    socket.on("room:message", (msg) => {
      if (inRoom) appendRoomMessage(msg);
    });
    socket.on("room:delete", (msgId) => {
      const el = document.getElementById("msg-" + msgId);
      if (el) el.remove();
    });
  }

  async function loadSlots() {
    const res = await fetch(`${BACKEND}/slots`, { headers: { "x-auth-token": authToken } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    slots = data.slots;
    const meRes = await fetch(`${BACKEND}/me/pfp`, { headers: { "x-auth-token": authToken } });
    const meData = await meRes.json();
    setPfp(meData.pfp);
    if (currentUsername === "drerrie1") document.getElementById("admin-link").style.display = "";
    renderSlots();
    switchSlot(1);
    initSocket();
  }

  function renderSlots() {
    const list = document.getElementById("slot-list");
    list.innerHTML = "";
    slots.forEach(s => {
      const row = document.createElement("div");
      row.className = "slot-row";

      const btn = document.createElement("button");
      btn.className = "slot-btn" + (!inRoom && s.id === activeSlot ? " active" : "");
      btn.textContent = s.empty ? `chat ${s.id}` : s.title;
      btn.onclick = () => switchSlot(s.id);

      const clr = document.createElement("button");
      clr.className = "slot-clear";
      clr.textContent = "leegmaken";
      clr.onclick = () => clearSlot(s.id);

      row.appendChild(btn);
      row.appendChild(clr);
      list.appendChild(row);
    });

    document.getElementById("room-btn").className = "slot-btn" + (inRoom ? " active" : "");
  }

  async function switchSlot(id) {
    inRoom = false;
    activeSlot = id;
    renderSlots();
    document.getElementById("foto-btn").style.display = "";
    input.placeholder = "vraag maar g";
    const chat = document.getElementById("chat");
    chat.innerHTML = "";
    const res = await fetch(`${BACKEND}/slots/${id}`, { headers: { "x-auth-token": authToken } });
    const data = await res.json();
    data.messages.forEach(m => addMessage(m.role, m.content));
  }

  async function openRoom() {
    inRoom = true;
    renderSlots();
    document.getElementById("foto-btn").style.display = "none";
    input.placeholder = "typ iets g...";
    const chat = document.getElementById("chat");
    chat.innerHTML = "";
    const res = await fetch(`${BACKEND}/room`, { headers: { "x-auth-token": authToken } });
    const data = await res.json();
    data.messages.forEach(msg => appendRoomMessage(msg));
  }

  function appendRoomMessage(msg) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "room-msg" + (msg.username === currentUsername ? " mine" : "");
    div.id = "msg-" + msg.id;

    const sender = document.createElement("div");
    sender.className = "sender";
    sender.textContent = msg.displayName;

    if (currentUsername === "drerrie1") {
      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "verwijder";
      del.onclick = () => deleteRoomMsg(msg.id);
      sender.appendChild(del);
    }

    const text = document.createElement("div");
    text.textContent = msg.text;

    div.appendChild(sender);
    div.appendChild(text);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function deleteRoomMsg(msgId) {
    await fetch(`${BACKEND}/room/${msgId}`, { method: "DELETE", headers: { "x-auth-token": authToken } });
  }

  async function clearSlot(id) {
    await fetch(`${BACKEND}/slots/${id}/clear`, { method: "POST", headers: { "x-auth-token": authToken } });
    slots = slots.map(s => s.id === id ? { ...s, title: `chat ${id}`, empty: true } : s);
    if (!inRoom && activeSlot === id) document.getElementById("chat").innerHTML = "";
    renderSlots();
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("username");
    authToken = null;
    if (socket) socket.disconnect();
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("login-pass").value = "";
    document.getElementById("login-error").style.display = "none";
    updateBar(0);
  }

  function updateBar(pct) {
    const bar = document.getElementById("credit-bar");
    const label = document.getElementById("credit-pct");
    bar.style.width = pct + "%";
    label.textContent = Math.round(pct) + "%";
    if (pct < 50) bar.style.background = "#4cca6e";
    else if (pct < 80) bar.style.background = "#f5c842";
    else bar.style.background = "#e84040";
  }

  const chat = document.getElementById("chat");
  const input = document.getElementById("message-input");
  const imageInput = document.getElementById("image-input");
  const imageName = document.getElementById("image-name");

  imageInput.addEventListener("change", () => {
    imageName.textContent = imageInput.files[0]?.name || "";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(role, text, imageSrc) {
    if (role === "assistant") {
      const wrapper = document.createElement("div");
      wrapper.style.cssText = "display:flex; align-items:flex-start; gap:8px;";

      const avatar = document.createElement("img");
      avatar.src = "morad.png";
      avatar.onerror = () => avatar.style.display = "none";
      avatar.style.cssText = "width:28px; height:28px; object-fit:cover; border:1px solid rgba(255,255,255,0.8); flex-shrink:0; margin-top:2px;";

      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;

      wrapper.appendChild(avatar);
      wrapper.appendChild(div);
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    if (imageSrc) {
      const img = document.createElement("img");
      img.src = imageSrc;
      img.className = "image-preview";
      div.appendChild(img);
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message && !imageInput.files[0]) return;

    if (inRoom) {
      if (!message) return;
      socket.emit("room:message", message);
      input.value = "";
      return;
    }

    const file = imageInput.files[0];
    const imageSrc = file ? URL.createObjectURL(file) : null;
    addMessage("user", message, imageSrc);

    input.value = "";
    imageName.textContent = "";
    imageInput.value = "";

    const typing = addMessage("assistant", "aan het denken...");
    typing.classList.add("typing");

    const formData = new FormData();
    formData.append("message", message);
    formData.append("slotId", activeSlot);
    if (file) formData.append("image", file);

    const res = await fetch(`${BACKEND}/chat`, { method: "POST", body: formData, headers: { "x-auth-token": authToken } });
    const data = await res.json();

    typing.classList.remove("typing");
    typing.textContent = data.reply;

    if (data.pct !== undefined) updateBar(data.pct);
    if (data.locked) setTimeout(() => logout(), 2000);

    const slot = slots.find(s => s.id === activeSlot);
    if (slot && slot.empty) {
      slot.empty = false;
      slot.title = message.substring(0, 28) + (message.length > 28 ? "..." : "");
      renderSlots();
    }
  }
</script>

</body>
</html>
