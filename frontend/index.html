<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>s7ab-ai</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      background: url('background.jpg') center/cover no-repeat fixed, linear-gradient(160deg, #a8e4f7 0%, #c9f0c8 50%, #7ecff5 100%);
      color: #1a3a4a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.75) 0%, rgba(160,220,255,0.6) 50%, rgba(100,190,240,0.5) 100%);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid rgba(255,255,255,0.8);
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a5a7a;
      text-shadow: 0 1px 2px rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(100,200,255,0.3);
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header span {
      display: inline-block;
      animation: spin 6s linear infinite;
    }

    header small {
      font-size: 0.7rem;
      font-weight: 400;
      color: #4a8aaa;
      text-shadow: none;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 70%;
      padding: 10px 16px;
      line-height: 1.5;
      font-size: 0.88rem;
      white-space: pre-wrap;
    }

    .user {
      background: linear-gradient(180deg, rgba(120,200,255,0.85) 0%, rgba(60,150,230,0.9) 100%);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 8px rgba(0,100,200,0.25), inset 0 1px 0 rgba(255,255,255,0.6);
      align-self: flex-end;
      color: white;
      text-shadow: 0 1px 2px rgba(0,80,160,0.4);
    }

    .assistant {
      background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(220,245,255,0.8) 100%);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 8px rgba(0,150,255,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
      align-self: flex-start;
      color: #1a3a4a;
    }

    .image-preview {
      max-width: 200px;
      margin-top: 8px;
      display: block;
      border: 1px solid rgba(255,255,255,0.6);
    }

    #input-area {
      padding: 14px 20px;
      background: linear-gradient(180deg, rgba(200,240,255,0.6) 0%, rgba(255,255,255,0.7) 100%);
      backdrop-filter: blur(8px);
      border-top: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 -2px 8px rgba(100,200,255,0.2);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(230,248,255,0.9) 100%);
      border: 1px solid rgba(100,180,240,0.6);
      padding: 10px 14px;
      color: #1a3a4a;
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      font-size: 0.88rem;
      resize: none;
      outline: none;
      max-height: 120px;
      box-shadow: inset 0 1px 4px rgba(0,100,200,0.1);
    }

    #image-input { display: none; }

    .icon-btn {
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(180,230,255,0.8) 50%, rgba(120,200,255,0.7) 100%);
      border: 1px solid rgba(100,180,240,0.7);
      padding: 9px 12px;
      cursor: pointer;
      color: #1a5a7a;
      font-size: 0.85rem;
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      box-shadow: 0 2px 4px rgba(0,100,200,0.2), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: all 0.15s;
    }

    .icon-btn:hover {
      background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(200,240,255,0.9) 50%, rgba(140,210,255,0.8) 100%);
    }

    #send-btn {
      background: linear-gradient(180deg, #7dd6f7 0%, #3aaeee 40%, #1a8fd4 100%);
      border: 1px solid rgba(255,255,255,0.6);
      padding: 9px 18px;
      cursor: pointer;
      color: white;
      font-family: Tahoma, Verdana, Geneva, sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,80,160,0.5);
      box-shadow: 0 3px 8px rgba(0,100,200,0.35), inset 0 1px 0 rgba(255,255,255,0.5);
      transition: all 0.15s;
    }

    #send-btn:hover {
      background: linear-gradient(180deg, #9de4ff 0%, #55c0f5 40%, #2a9fe0 100%);
    }

    #image-name {
      font-size: 0.72rem;
      color: #3a8aaa;
      padding: 4px 0 0 4px;
    }

    .typing {
      color: #5a9ab5;
      font-style: italic;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div id="login-screen" style="
  position:fixed; inset:0; background:rgba(0,0,0,0.82);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; z-index:999; font-family:Tahoma, Verdana, Geneva, sans-serif;">
  <h2 style="color:white; font-size:1.2rem; font-weight:700;">iyee uw eigen ai asa7bi</h2>
  <input id="login-user" placeholder="username" style="padding:9px 14px; border:1px solid rgba(100,180,240,0.7); font-family:Tahoma,sans-serif; font-size:0.88rem; width:220px; background:rgba(255,255,255,0.92); color:#1a3a4a;" />
  <input id="login-pass" type="password" placeholder="wachtwoord g" style="padding:9px 14px; border:1px solid rgba(100,180,240,0.7); font-family:Tahoma,sans-serif; font-size:0.88rem; width:220px; background:rgba(255,255,255,0.92); color:#1a3a4a;" />
  <button onclick="login()" style="padding:9px 24px; border:1px solid rgba(255,255,255,0.6); background:linear-gradient(180deg,#7dd6f7 0%,#3aaeee 40%,#1a8fd4 100%); color:white; font-family:Tahoma,sans-serif; font-size:0.88rem; font-weight:700; cursor:pointer; box-shadow:0 3px 8px rgba(0,100,200,0.35);">dghil</button>
  <p id="login-error" style="color:#ff6060; display:none; font-size:0.82rem;">verkeerd g probeer opnieuw</p>
</div>

<header><span>iyee uw eigen ai asa7bi</span><small><a href="dev.html" style="color:#4a8aaa; text-decoration:none; font-size:0.7rem; font-weight:400;">dev</a></small></header>

<div id="chat"></div>

<div id="input-area">
  <div style="flex:1; display:flex; flex-direction:column;">
    <textarea id="message-input" rows="1" placeholder="vraag maar g"></textarea>
    <span id="image-name"></span>
  </div>
  <button class="icon-btn" onclick="document.getElementById('image-input').click()" title="geen cheatings aub">foto</button>
  <input type="file" id="image-input" accept="image/*" />
  <button id="send-btn" onclick="sendMessage()">scannings</button>
</div>

<script>
  const BACKEND = "http://localhost:3000";

  let authToken = sessionStorage.getItem("token");
  if (authToken) document.getElementById("login-screen").style.display = "none";

  async function login() {
    const username = document.getElementById("login-user").value.trim();
    const password = document.getElementById("login-pass").value.trim();
    const res = await fetch(`${BACKEND}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.success) {
      authToken = data.token;
      sessionStorage.setItem("token", authToken);
      document.getElementById("login-screen").style.display = "none";
    } else {
      document.getElementById("login-error").style.display = "block";
    }
  }

  const sessionId = Math.random().toString(36).substring(2);
  const chat = document.getElementById("chat");
  const input = document.getElementById("message-input");
  const imageInput = document.getElementById("image-input");
  const imageName = document.getElementById("image-name");

  imageInput.addEventListener("change", () => {
    imageName.textContent = imageInput.files[0]?.name || "";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(role, text, imageSrc) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    if (imageSrc) {
      const img = document.createElement("img");
      img.src = imageSrc;
      img.className = "image-preview";
      div.appendChild(img);
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const message = input.value.trim();
    const file = imageInput.files[0];
    if (!message && !file) return;

    const imageSrc = file ? URL.createObjectURL(file) : null;
    addMessage("user", message, imageSrc);

    input.value = "";
    imageName.textContent = "";
    imageInput.value = "";

    const typing = addMessage("assistant", "aan het denken...");
    typing.classList.add("typing");

    const formData = new FormData();
    formData.append("message", message);
    formData.append("sessionId", sessionId);
    if (file) formData.append("image", file);

    const res = await fetch(`${BACKEND}/chat`, { method: "POST", body: formData, headers: { "x-auth-token": authToken } });
    const data = await res.json();

    typing.classList.remove("typing");
    typing.textContent = data.reply;
  }
</script>

</body>
</html>
